#BPM Specialist:no IoT data source
process-data-sources:
  inspection:
    element-id: inspectionTask
    type: User Task
    events:
      completed:
        variables:
          - startTime: timeStamp
            internal-id: inspectionStart
          - endTime: timeStamp
            internal-id: inspectionEnd
          - packageId: string

  transportation:
    element-id: transportationTask
    type: User Task
    events:
      completed:
        variables:
          - startTime: timeStamp
            internal-id: transportStart
          - endTime: timeStamp
            internal-id: transportEnd
          - packageId: string

  gateway:
    element-id: complianceGateway
    type: Exclusive Gateway
    events:
      path-evaluation:
        variables:
          - selectedFlow: string
            internal-id: compliance

features:
  inspection_duration:
    from: inspection
    fields: [inspectionEnd, inspectionStart]
    operation: substract

  transportation_duration:
    from: transportation
    fields: [transportEnd, transportStart]
    operation: substract

  label_compliance:
    from: gateway
    field: compliance
    target-type: binary
    positive-class: yes

dataset:
  ds:
    data:
      - ID: packageId
      - DI: inspection_duration
      - DT: transportation_duration
    label:
      C: label_compliance

models:
  model:
    type: Classification
    algorithm: Random Forest
    dataset: ds
    hyperparameters:
      max-depth: 15
      n_estimators: 250