#IoT engineer: missing label feature in dataset, missing anchors
process-data-sources:
  inspection_source:
    element-id: inspectionTask
    type: User Task
    events:
      completed:
        variables:
          - startTime: timeStamp
            internal-id: iStart
          - endTime: timeStamp
            internal-id: iEnd
          - packageId: string

  transportation_source:
    element-id: transportationTask
    type: User Task
    events:
      completed:
        variables:
          - startTime: timeStamp
            internal-id: tStart
          - endTime: timeStamp
            internal-id: tEnd
          - packageId: string

  decision_source:
    element-id: complianceGateway
    type: Exclusive Gateway
    events:
      path-evaluation:
        variables:
          - selectedFlow: string
            internal-id: compliance

iot-data-sources:
  temp_sensor:
    format: application/json
    paradigm: MessageOriented
    protocol: AMQP
    broker: RabbitMQ
    host: http://localhost
    time-stamp: yyyy-MM-dd HH:mm:ss
    schema:
      - temperature: float
      - timeStamp: timeStamp
    vendor-specific:
      exchange: temp

features:
  f_inspection_duration:
    from: inspection_source
    fields: [iEnd, iStart]
    operation: substract

  f_transportation_duration:
    from: transportation_source
    fields: [tEnd, tStart]
    operation: substract

  f_avg_temp:
    from: temp_sensor
    operation: avg
    field: temperature
    window: tEnd-tStart

  label_compliance:
    from: decision_source
    field: compliance
    target-type: binary
    positive-class: yes

dataset:
  cold_chain_ds:
    data:
      - ID: packageId
      - DI: f_inspection_duration
      - DT: f_transportation_duration
      - TEMP: f_avg_temp

models:
  compliance_model:
    type: Classification
    algorithm: Random Forest
    dataset: cold_chain_ds
    hyperparameters:
      n_estimators: 250
      max_depth: 15
      

