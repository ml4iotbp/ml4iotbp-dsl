dataset:
  churn_ds:
    train-ratio: 0.6
    val-ratio: 0.2
    test-ratio: 0.2

models:
  churn_model:
    type: Classification
    algorithm: Random Forest
    dataset: churn_ds
    training:
      type: Batch
      metrics: [accuracy]
      schedule:
        type: Event-Based
        events:
          - element-id: taskA
            event: completed
    hyperparameters:
      n_estimators: 5